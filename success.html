<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyFlow • Premium Activated 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
:root{
  --primary:#818cf8;--primary-deep:#4f46e5;--primary-glow:rgba(129,140,248,.22);
  --bg:#080a12;--surface:#0d0f1a;
  --card:rgba(255,255,255,.04);--card-border:rgba(255,255,255,.08);--border:rgba(255,255,255,.07);
  --txt:#eef0ff;--txt-muted:#5a6480;--txt-dim:#2e3450;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}

/* Ambient background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(79,70,229,.2) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 15% 0%,  rgba(109,40,217,.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 85% 100%,rgba(251,191,36,.07) 0%, transparent 60%);
}

/* Floating particles */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.p{position:absolute;border-radius:50%;animation:float linear infinite;opacity:0;}
@keyframes float{
  0%  {transform:translateY(100vh) scale(0);opacity:0;}
  10% {opacity:.6;}
  90% {opacity:.3;}
  100%{transform:translateY(-10vh) scale(1);opacity:0;}
}

/* Card */
.card{
  position:relative;z-index:10;
  background:rgba(13,15,26,.9);
  border:1px solid rgba(251,191,36,.2);
  border-radius:28px;
  padding:3rem 2.5rem 2.5rem;
  max-width:480px;width:90%;
  text-align:center;
  box-shadow:0 0 60px rgba(251,191,36,.08), 0 30px 60px rgba(0,0,0,.5);
  animation:cardIn .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Top glow line */
.card::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:2px;
  background:linear-gradient(90deg,transparent,var(--amber),rgba(251,191,36,.5),var(--amber),transparent);
  border-radius:2px;
}

/* Crown icon */
.crown-wrap{
  position:relative;display:inline-flex;
  align-items:center;justify-content:center;
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,191,36,.05));
  border:1px solid rgba(251,191,36,.3);
  margin:0 auto 1.4rem;
  animation:crownPop .5s cubic-bezier(.34,1.56,.64,1) .3s both;
}
@keyframes crownPop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.crown-wrap::after{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(251,191,36,.15);
  animation:crownRing 2.5s ease-in-out infinite;
}
@keyframes crownRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.1);opacity:1}}
.crown-wrap i{width:34px;height:34px;color:var(--amber);filter:drop-shadow(0 0 10px rgba(251,191,36,.6));}

/* Title */
.title{
  font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;
  letter-spacing:-.03em;margin-bottom:.5rem;
  background:linear-gradient(135deg,#fff 30%,var(--amber) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:slideUp .5s ease .2s both;
}
.subtitle{
  font-size:.9rem;color:var(--txt-muted);line-height:1.65;
  margin-bottom:1.8rem;
  animation:slideUp .5s ease .3s both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Status box */
.status-box{
  background:rgba(52,211,153,.06);
  border:1px solid rgba(52,211,153,.18);
  border-radius:14px;padding:1rem 1.2rem;
  margin-bottom:1.5rem;
  display:flex;align-items:center;gap:10px;
  animation:slideUp .5s ease .4s both;
}
.status-ico{
  width:32px;height:32px;border-radius:50%;
  background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.25);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.status-ico i{width:15px;height:15px;color:var(--green);}
.status-ico.loading i{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.status-ico.error{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.22);}
.status-ico.error i{color:var(--red);}
#statusText{font-size:.85rem;font-weight:600;color:var(--txt);text-align:left;line-height:1.5;}

/* Perks list */
.perks{
  display:grid;grid-template-columns:1fr 1fr;gap:.6rem;
  margin-bottom:1.8rem;
  animation:slideUp .5s ease .45s both;
}
.perk{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.03);border:1px solid var(--card-border);
  border-radius:11px;padding:.65rem .9rem;text-align:left;
}
.perk i{width:14px;height:14px;color:var(--amber);flex-shrink:0;}
.perk span{font-size:.78rem;font-weight:500;color:var(--txt-muted);}

/* Countdown */
.countdown-wrap{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:.78rem;color:var(--txt-muted);margin-bottom:1.5rem;
  animation:slideUp .5s ease .5s both;
}
.countdown-wrap i{width:13px;height:13px;}
#countdown{
  font-family:'Syne',sans-serif;font-weight:700;color:var(--primary);
  min-width:14px;display:inline-block;text-align:center;
}

/* Progress bar */
.progress-bar{
  height:3px;background:rgba(255,255,255,.06);border-radius:3px;
  margin-bottom:1.6rem;overflow:hidden;
  animation:slideUp .5s ease .52s both;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--primary-deep),var(--primary),var(--amber));
  border-radius:3px;width:0%;
  transition:width .4s ease;
}

/* CTA button */
.btn-dashboard{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:.85rem 1.5rem;border-radius:14px;border:none;
  background:linear-gradient(135deg,#4f46e5,#6d28d9);color:white;
  font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;
  cursor:pointer;text-decoration:none;
  transition:transform .18s,box-shadow .18s;
  box-shadow:0 4px 18px rgba(79,70,229,.4);
  animation:slideUp .5s ease .55s both;
}
.btn-dashboard i{width:16px;height:16px;}
.btn-dashboard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,70,229,.6);}

/* User info pill */
.user-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.15);
  border-radius:30px;padding:6px 14px;
  font-size:.78rem;font-weight:600;color:var(--amber);
  margin-bottom:1.5rem;
  animation:slideUp .5s ease .35s both;
}
.user-pill i{width:13px;height:13px;}
</style>
</head>
<body>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Card -->
<div class="card">

  <div class="crown-wrap"><i data-lucide="crown"></i></div>

  <div class="title">Premium Activated!</div>
  <p class="subtitle">Welcome to StudyFlow Premium. You now have unlimited access to everything.</p>

  <!-- Logged-in user -->
  <div class="user-pill" id="userPill" style="display:none">
    <i data-lucide="user"></i>
    <span id="userPillName">Loading…</span>
  </div>

  <!-- Status -->
  <div class="status-box">
    <div class="status-ico loading" id="statusIco">
      <i data-lucide="loader"></i>
    </div>
    <div id="statusText">Activating your premium access…</div>
  </div>

  <!-- Premium perks -->
  <div class="perks" id="perksBlock" style="display:none">
    <div class="perk"><i data-lucide="infinity"></i><span>Unlimited AI</span></div>
    <div class="perk"><i data-lucide="upload-cloud"></i><span>Unlimited Uploads</span></div>
    <div class="perk"><i data-lucide="crown"></i><span>VIP Badge</span></div>
    <div class="perk"><i data-lucide="zap"></i><span>Priority Chat</span></div>
    <div class="perk"><i data-lucide="shield-check"></i><span>Ad-Free</span></div>
    <div class="perk"><i data-lucide="star"></i><span>Exclusive Content</span></div>
  </div>

  <!-- Countdown -->
  <div class="countdown-wrap" id="countdownWrap" style="display:none">
    <i data-lucide="clock"></i>
    Redirecting to dashboard in <span id="countdown">5</span>s
  </div>

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar" style="display:none">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Manual CTA -->
  <a href="index.html" class="btn-dashboard" id="dashBtn">
    <i data-lucide="layout-dashboard"></i>Go to Dashboard
  </a>

</div>

<script type="module">
import { initializeApp }               from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app  = initializeApp({
  apiKey:"AIzaSyA-4YyVROZz-OIAGTWhpMMpuJe2Xag9Fig",
  authDomain:"vibe-jolt.firebaseapp.com",
  projectId:"vibe-jolt",
  storageBucket:"vibe-jolt.appspot.com",
  messagingSenderId:"386156754842",
  appId:"1:386156754842:web:8b5e45a3c7f20ac9616c23"
});
const auth = getAuth(app);
const db   = getFirestore(app);

const STRIPE_KEY = "pk_test_51T7QhcEF3VEiEWy7tyDlnpJRGYlZLjdy4vbNTzGLi5vsc0u4RZYPql6d2oxl7bpAqmaM9P2Es6w9qrkMntKtqdhG00oV3aFRuq";
const stripe     = Stripe(STRIPE_KEY);

const G = id => document.getElementById(id);

// ── FLOATING PARTICLES ──
function spawnParticles(){
  const container = G("particles");
  const colors    = ["rgba(251,191,36,.5)","rgba(129,140,248,.4)","rgba(52,211,153,.35)","rgba(255,255,255,.2)"];
  for(let i=0;i<22;i++){
    const p   = document.createElement("div");
    p.className = "p";
    const size = 4 + Math.random()*10;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
    `;
    container.appendChild(p);
  }
}
spawnParticles();

// ── SET STATUS ──
function setStatus(text, type="loading"){
  G("statusText").textContent = text;
  const ico = G("statusIco");
  if(type==="success"){
    ico.className = "status-ico";
    ico.innerHTML = '<i data-lucide="check-circle"></i>';
    ico.style.background  = "rgba(52,211,153,.15)";
    ico.style.borderColor = "rgba(52,211,153,.25)";
  } else if(type==="error"){
    ico.className = "status-ico error";
    ico.innerHTML = '<i data-lucide="alert-circle"></i>';
  } else {
    ico.className = "status-ico loading";
    ico.innerHTML = '<i data-lucide="loader"></i>';
  }
  lucide.createIcons();
}

// ── CONFETTI BURST ──
function fireConfetti(){
  const end = Date.now() + 2200;
  const colors = ["#818cf8","#fbbf24","#34d399","#ffffff","#4f46e5"];
  (function frame(){
    confetti({ particleCount:4, angle:60,  spread:55, origin:{x:0,y:.65}, colors });
    confetti({ particleCount:4, angle:120, spread:55, origin:{x:1,y:.65}, colors });
    if(Date.now()<end) requestAnimationFrame(frame);
  })();
  confetti({ particleCount:80, spread:90, origin:{y:.6}, colors });
}

// ── COUNTDOWN & REDIRECT ──
function startCountdown(){
  G("countdownWrap").style.display = "flex";
  G("progressBar").style.display   = "block";
  let secs = 5;
  G("countdown").textContent = secs;
  G("progressFill").style.width = "0%";

  // Animate progress to 100% over 5s
  requestAnimationFrame(()=>{
    G("progressFill").style.transition = "width 5s linear";
    G("progressFill").style.width = "100%";
  });

  const timer = setInterval(()=>{
    secs--;
    G("countdown").textContent = secs;
    if(secs<=0){
      clearInterval(timer);
      window.location.href = "index.html";
    }
  },1000);
}

// ── ACTIVATE PREMIUM ──
async function activatePremium(user){
  // Show user pill
  const name = user.displayName || user.email.split("@")[0];
  G("userPillName").textContent = name;
  G("userPill").style.display   = "inline-flex";
  lucide.createIcons();

  const params    = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");
  const plan      = params.get("plan") || "monthly"; // monthly or yearly

  if(!sessionId){
    setStatus("No session ID found. If you just subscribed, contact support.", "error");
    return;
  }

  try{
    setStatus("Verifying your payment…", "loading");

    // Retrieve Stripe session
    const session = await stripe.retrieveSession(sessionId).catch(()=>null);
    const paid    = session && (session.payment_status==="paid" || session.status==="complete");

    if(!paid){
      setStatus("Payment not confirmed. If this is a mistake, contact support.", "error");
      return;
    }

    setStatus("Writing premium access to your account…", "loading");

    // Determine subscription length
    const monthsMap = { monthly:1, yearly:12 };
    const months    = monthsMap[plan] || 1;
    const subEnd    = new Date(Date.now() + months * 30.44 * 24 * 60 * 60 * 1000);

    await updateDoc(doc(db,"users",user.uid),{
      isPremium:         true,
      subscriptionTier:  plan,
      subscriptionEnd:   subEnd,
      premiumActivatedAt: serverTimestamp(),
      updatedAt:          serverTimestamp()
    });

    // ── SUCCESS ──
    setStatus("✅ Premium is now active on your account!", "success");
    G("perksBlock").style.display = "grid";
    lucide.createIcons();

    fireConfetti();
    startCountdown();

  }catch(err){
    console.error("Activation error:", err);
    setStatus("Activation error: " + (err.message||"Unknown error") + ". Please contact support.", "error");
  }
}

// ── AUTH GUARD ──
onAuthStateChanged(auth, user => {
  if(!user){ window.location.href = "auth.html"; return; }
  activatePremium(user);
});

lucide.createIcons();
</script>
</body>
</html>
